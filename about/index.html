<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>このサイトについて | こころ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #FAF8F4; --surface: #FFFFFF; --accent: #C45E5E; --accent2: #E8B4A0; --text: #2C2C2C; --muted: #888; --border: #E8E2D9; --radius: 16px; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; padding: 40px 16px 80px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  .site-header { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-align: center; margin-bottom: 40px; }
  .site-header a { color: var(--accent); text-decoration: none; }
  .hero { background: var(--surface); border-radius: var(--radius); padding: 40px 32px; text-align: center; box-shadow: 0 2px 24px rgba(0,0,0,0.06); margin-bottom: 20px; }
  .hero-emoji { font-size: 56px; display: block; margin-bottom: 16px; }
  h1 { font-family: 'Noto Serif JP', serif; font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  .tagline { font-size: 14px; color: var(--muted); line-height: 1.8; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 28px 32px; box-shadow: 0 2px 24px rgba(0,0,0,0.06); margin-bottom: 16px; }
  h2 { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
  p { font-size: 14px; line-height: 1.9; color: #444; }
  .links { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .link-btn { display: block; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--text); text-decoration: none; transition: border-color 0.2s; }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="site-header"><a href="/">← こころ診断トップへ</a></div>

  <div class="hero">
    <span class="hero-emoji">🔮</span>
    <h1>こころ診断について</h1>
    <p class="tagline">「自分のこと、ちゃんとわかってる？」<br>そんな問いかけから、このサイトは生まれました。</p>
  </div>

  <div class="card">
    <h2>このサイトのこと</h2>
    <p>こころ診断は、恋愛・性格・職場など、日常のさまざまなテーマで心理診断コンテンツを提供するサイトです。難しく考えず、気軽に「自分探し」を楽しんでもらえることを目指しています。</p>
  </div>

  <div class="card">
    <h2>コンテンツについて</h2>
    <p>掲載している診断はすべてエンターテインメント目的で制作されたものです。科学的・臨床的な根拠に基づくものではありません。あくまで参考としてお楽しみください。</p>
  </div>

  <div class="card">
    <h2>リンク</h2>
    <div class="links">
      <a href="/privacy/" class="link-btn">📄 プライバシーポリシー</a>
      <a href="/contact/" class="link-btn">✉️ お問い合わせ</a>
    </div>
  </div>
</div>
</body>
</html>
