  .progress-bar-bg {

    overflow: hidden;

  .progress-bar-fill {

    overflow: hidden;
  }

    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--pink-mid);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .option-btn:hover {
    border-color: var(--pink-mid);
    background: #FFF0F8;
    transform: translateX(3px);

  .option-btn:hover::before { opacity: 1; }

  .option-btn.selected {
    background: var(--pink-light);
    border-color: var(--pink-deep);
    color: var(--pink-deep);
    font-weight: 600;

    border-radius: var(--radius-pill);

  .result-highlight {

    padding: 14px 16px;

  .result-meter-fill {

  .site-footer {

  .toast {

    background: var(--text-dark);
    color: var(--white);
    padding: 12px 24px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);

  @media (max-width: 400px) {
    .main-title { font-size: 22px; }
    .q-text { font-size: 16px; }
    .share-buttons { flex-direction: column; }
  }
</style>

let currentQ = 0;
let totalScore = 0;
let selectedScore = null;
let quizStarted = false;
let currentResult = null;

function handleMainBtn() {
  if (!quizStarted) {
    startQuiz();
    return;
  }
  if (selectedScore === null) {
    showToast("選択肢を選んでください🩷");
    return;
  }
  totalScore += selectedScore;
  selectedScore = null;
  currentQ++;
  if (currentQ < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function startQuiz() {
  quizStarted = true;
  document.getElementById('intro-card').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('question-card').classList.remove('hidden');
  document.getElementById('main-btn').textContent = "次へ →";
  document.getElementById('main-btn').disabled = true;
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const n = currentQ + 1;
  const total = questions.length;

  document.getElementById('q-number').textContent = `Q${n}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-count').textContent = `${n} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((n-1)/total)*100}%`;

  if (n === total) {
    document.getElementById('main-btn').textContent = "診断結果を見る ✦";
  } else {
    document.getElementById('main-btn').textContent = "次へ →";
  }
  document.getElementById('main-btn').disabled = true;

  const letters = ['A', 'B', 'C', 'D'];
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt.text}`;
    btn.onclick = () => selectOption(btn, opt.score);
    list.appendChild(btn);
  });

  document.getElementById('question-card').style.animation = 'none';
  void document.getElementById('question-card').offsetWidth;
  document.getElementById('question-card').style.animation = 'slideIn 0.3s ease';
}

function selectOption(btn, score) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedScore = score;
  document.getElementById('main-btn').disabled = false;
}

function showResult() {
  document.getElementById('progress-bar').style.width = '100%';
  setTimeout(() => {
    document.getElementById('quiz-section').style.display = 'none';
    const rs = document.getElementById('result-section');
    rs.classList.add('visible');

    const r = results.find(res => totalScore >= res.min && totalScore <= res.max) || results[results.length - 1];
    currentResult = r;

    document.getElementById('res-emoji').textContent = r.emoji;
    document.getElementById('res-name').textContent = r.name;
    document.getElementById('res-score-badge').textContent = `スコア　${totalScore} 点`;
    document.getElementById('res-desc').textContent = r.desc;
    document.getElementById('res-highlight').textContent = r.highlight;
    document.getElementById('res-meter-pct').textContent = `${r.pct}%`;

    requestAnimationFrame(() => {
      setTimeout(() => {
        document.getElementById('res-meter-fill').style.width = `${r.pct}%`;
      }, 100);
    });

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 300);
}

function resetQuiz() {
  currentQ = 0;
  totalScore = 0;
  selectedScore = null;
  quizStarted = false;
  currentResult = null;

  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('intro-card').classList.remove('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');
  document.getElementById('question-card').classList.add('hidden');
  document.getElementById('main-btn').textContent = "診断スタート ✦";
  document.getElementById('main-btn').disabled = false;
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('res-meter-fill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getShareText() {
  if (!currentResult) return '';
  return `【隠れメンヘラ診断】\n私のタイプは「${currentResult.name}」でした！\nポックリ病レベル：${currentResult.pct}%\n\n${currentResult.highlight}\n\nあなたも診断してみて👇`;
}

function shareToX() {
  const text = getShareText();
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function shareToLine(){var t=getShareText();window.location.href='line://msg/text/'+encodeURIComponent(t);setTimeout(function(){window.open('https://line.me/R/msg/text/'+encodeURIComponent(t),'_blank')},500);}

function copyResult() {
  const text = getShareText() + `\n${window.location.href}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast("コピーしました！"));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast("コピーしました！");
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

}
