<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | こころ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #FAF8F4; --surface: #FFFFFF; --accent: #C45E5E; --text: #2C2C2C; --muted: #888; --border: #E8E2D9; --radius: 12px; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; padding: 40px 16px 80px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  .site-header { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; text-align: center; margin-bottom: 40px; }
  .site-header a { color: var(--accent); text-decoration: none; }
  h1 { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .desc { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 32px; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 32px; box-shadow: 0 2px 24px rgba(0,0,0,0.06); }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  input, textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { height: 140px; resize: vertical; }
  .btn { display: block; width: 100%; background: var(--accent); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: #B04848; }
  .note { font-size: 12px; color: var(--muted); margin-top: 16px; line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="site-header"><a href="/">← こころ診断トップへ</a></div>

  <h1>お問い合わせ</h1>
  <p class="desc">ご意見・ご要望・不具合のご報告など、お気軽にご連絡ください。</p>

  <div class="card">
    <form action="https://formspree.io/f/あなたのFormspreeID" method="POST">
      <div class="form-group">
        <label>お名前</label>
        <input type="text" name="name" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" name="email" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label>お問い合わせ内容</label>
        <textarea name="message" placeholder="こちらにご記入ください..." required></textarea>
      </div>
      <button type="submit" class="btn">送信する</button>
    </form>
    <p class="note">※ 返信まで数日かかる場合がございます。ご了承ください。</p>
  </div>
</div>
</body>
</html>
